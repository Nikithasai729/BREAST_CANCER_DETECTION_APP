<!DOCTYPE html>
<html>
<head>
    <title>Breast Cancer Detection</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            margin: auto;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
        }

        .examples {
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <h1>🧠 Breast Cancer Detection</h1>
    <h3>Quick AI Prediction </h3>

    <div class="container">
        <form action="/predict" method="post">

            <input type="number" step="any" name="radius" placeholder="Mean Radius" required>
            <input type="number" step="any" name="texture" placeholder="Mean Texture" required>
            <input type="number" step="any" name="perimeter" placeholder="Mean Perimeter" required>

            <button type="submit">🔍 Predict</button>
        </form>

        <div class="result">
            <p>{{ prediction_text }}</p>
            <p>{{ confidence }}</p>
        </div>
    </div>

   
</body>
</html>
